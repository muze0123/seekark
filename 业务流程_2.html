          <p><span style="font-family:&quot;ArialMT&quot;, &quot;Arial&quot;, sans-serif;">1</span><span style="font-family:&quot;PingFangSC-Regular&quot;, &quot;PingFang SC&quot;, sans-serif;">、素材中心上传</span><span style="font-family:&quot;ArialMT&quot;, &quot;Arial&quot;, sans-serif;">/</span><span style="font-family:&quot;PingFangSC-Regular&quot;, &quot;PingFang SC&quot;, sans-serif;">上新/复制/选择文件，均会在网盘-素材文件中存储一份文件</span></p><p><span style="font-family:&quot;PingFangSC-Regular&quot;, &quot;PingFang SC&quot;, sans-serif;">2、在网盘中删除素材文件，则同步在“素材中心”预览文件时，显示‘视频已删除’、‘图片已删除’</span></p><p><span style="font-family:&quot;PingFangSC-Regular&quot;, &quot;PingFang SC&quot;, sans-serif;">3、在“素材中心”删除素材，可选择是否同步删除网盘文件</span></p><p><span style="font-family:&quot;PingFangSC-Regular&quot;, &quot;PingFang SC&quot;, sans-serif;">4、网盘中的素材文件不支持移动改变文件路径</span></p>
